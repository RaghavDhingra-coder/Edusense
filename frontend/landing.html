<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSense AI — Smart Classroom Analytics</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'] },
                    colors: {
                        indigo: {
                            50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe',
                            300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1',
                            600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 25%, #4338ca 60%, #6d28d9 100%); }
        .card-hover { transition: transform 0.25s ease, box-shadow 0.25s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(99,102,241,0.15); }
        .dot-grid {
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.25) 1px, transparent 0);
            background-size: 36px 36px;
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .float { animation: float 4s ease-in-out infinite; }
        @keyframes pulse-slow { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .pulse-slow { animation: pulse-slow 2s ease-in-out infinite; }
    </style>
</head>
<body class="bg-white antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        /* ─── Navbar ─── */
        function Navbar() {
            const [scrolled, setScrolled] = useState(false);
            const [open, setOpen] = useState(false);

            useEffect(() => {
                const handler = () => setScrolled(window.scrollY > 24);
                window.addEventListener('scroll', handler);
                return () => window.removeEventListener('scroll', handler);
            }, []);

            const navLink = scrolled
                ? 'text-gray-600 hover:text-indigo-600'
                : 'text-white/80 hover:text-white';

            return (
                <nav className={`fixed top-0 inset-x-0 z-50 transition-all duration-300 ${scrolled ? 'bg-white/95 backdrop-blur shadow-sm' : 'bg-transparent'}`}>
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16 md:h-20">
                            {/* Logo */}
                            <a href="/" className="flex items-center gap-3 group">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg group-hover:bg-indigo-700 transition-colors">
                                    <i className="fas fa-graduation-cap text-white text-base"></i>
                                </div>
                                <span className={`text-xl font-bold tracking-tight transition-colors ${scrolled ? 'text-gray-900' : 'text-white'}`}>
                                    EduSense <span className={scrolled ? 'text-indigo-600' : 'text-indigo-300'}>AI</span>
                                </span>
                            </a>

                            {/* Desktop links */}
                            <div className="hidden md:flex items-center gap-8">
                                <a href="#features" className={`text-sm font-medium transition-colors ${navLink}`}>Features</a>
                                <a href="#how-it-works" className={`text-sm font-medium transition-colors ${navLink}`}>How It Works</a>
                                <a
                                    href="register.html"
                                    className={`text-sm font-medium px-4 py-2 rounded-lg border transition-all ${scrolled ? 'border-indigo-500 text-indigo-600 hover:bg-indigo-50' : 'border-white/40 text-white hover:bg-white/10'}`}
                                >
                                    Register Students
                                </a>
                                <a
                                    href="index_integrated.html"
                                    className="text-sm font-semibold px-5 py-2.5 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-500/30"
                                >
                                    Open Dashboard
                                </a>
                            </div>

                            {/* Mobile toggle */}
                            <button
                                onClick={() => setOpen(!open)}
                                className={`md:hidden p-2 rounded-lg transition-colors ${scrolled ? 'text-gray-700 hover:bg-gray-100' : 'text-white hover:bg-white/10'}`}
                            >
                                <i className={`fas ${open ? 'fa-times' : 'fa-bars'} text-lg`}></i>
                            </button>
                        </div>

                        {/* Mobile menu */}
                        {open && (
                            <div className="md:hidden bg-white rounded-2xl shadow-xl mb-4 p-4 border border-gray-100 space-y-2">
                                <a href="#features" onClick={() => setOpen(false)} className="block text-sm font-medium text-gray-700 py-2 px-3 rounded-lg hover:bg-gray-50">Features</a>
                                <a href="#how-it-works" onClick={() => setOpen(false)} className="block text-sm font-medium text-gray-700 py-2 px-3 rounded-lg hover:bg-gray-50">How It Works</a>
                                <a href="register.html" className="block text-sm font-medium text-indigo-600 py-2 px-3 rounded-lg border border-indigo-200 hover:bg-indigo-50 text-center">Register Students</a>
                                <a href="index_integrated.html" className="block text-sm font-semibold bg-indigo-600 text-white py-2 px-3 rounded-lg hover:bg-indigo-700 text-center">Open Dashboard</a>
                            </div>
                        )}
                    </div>
                </nav>
            );
        }

        /* ─── Hero ─── */
        function Hero() {
            return (
                <section className="hero-gradient min-h-screen flex items-center pt-16 relative overflow-hidden">
                    {/* Ambient blobs */}
                    <div className="absolute -top-52 -right-52 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                    <div className="absolute -bottom-52 -left-52 w-96 h-96 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                    <div className="absolute top-1/2 left-1/3 w-64 h-64 bg-violet-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10"></div>
                    <div className="absolute inset-0 dot-grid"></div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24 relative z-10 w-full">
                        <div className="grid lg:grid-cols-2 gap-16 items-center">
                            {/* Left copy */}
                            <div>
                                <div className="inline-flex items-center gap-2 bg-white/10 backdrop-blur border border-white/20 rounded-full px-4 py-1.5 text-sm text-white/90 mb-6">
                                    <span className="w-2 h-2 bg-green-400 rounded-full pulse-slow"></span>
                                    AI-Powered Education Technology
                                </div>

                                <h1 className="text-4xl sm:text-5xl lg:text-6xl font-extrabold text-white leading-tight mb-6">
                                    Transform Your Classroom with{' '}
                                    <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300">
                                        AI Engagement Analytics
                                    </span>
                                </h1>

                                <p className="text-lg text-white/70 mb-10 leading-relaxed max-w-xl">
                                    Real-time student attention tracking, automated face recognition, and deep engagement insights — powered by advanced computer vision and machine learning.
                                </p>

                                <div className="flex flex-col sm:flex-row gap-4">
                                    <a
                                        href="index_integrated.html"
                                        className="inline-flex items-center justify-center gap-2 bg-white text-indigo-700 font-semibold px-8 py-4 rounded-xl hover:bg-indigo-50 transition-all shadow-2xl shadow-black/20 text-base"
                                    >
                                        <i className="fas fa-chart-line"></i>
                                        Open Dashboard
                                    </a>
                                    <a
                                        href="register.html"
                                        className="inline-flex items-center justify-center gap-2 bg-white/10 backdrop-blur text-white font-semibold px-8 py-4 rounded-xl hover:bg-white/20 transition-all border border-white/30 text-base"
                                    >
                                        <i className="fas fa-user-plus"></i>
                                        Register Students
                                    </a>
                                </div>

                                {/* Stats row */}
                                <div className="flex flex-wrap items-center gap-8 mt-12 pt-8 border-t border-white/10">
                                    {[
                                        { value: '95%', label: 'Recognition Accuracy' },
                                        { value: 'Real-time', label: 'Engagement Tracking' },
                                        { value: 'Zero', label: 'Manual Configuration' },
                                    ].map((s, i) => (
                                        <React.Fragment key={s.label}>
                                            {i > 0 && <div className="w-px h-10 bg-white/20 hidden sm:block"></div>}
                                            <div>
                                                <div className="text-2xl font-bold text-white">{s.value}</div>
                                                <div className="text-xs text-white/60 mt-0.5">{s.label}</div>
                                            </div>
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>

                            {/* Right — dashboard preview card */}
                            <div className="hidden lg:block float">
                                <div className="bg-white/10 backdrop-blur-2xl rounded-2xl border border-white/20 p-6 shadow-2xl">
                                    {/* Fake browser chrome */}
                                    <div className="flex items-center gap-2 mb-5">
                                        <div className="w-3 h-3 rounded-full bg-red-400"></div>
                                        <div className="w-3 h-3 rounded-full bg-yellow-400"></div>
                                        <div className="w-3 h-3 rounded-full bg-green-400"></div>
                                        <div className="flex-1 bg-white/10 rounded h-6 ml-3 flex items-center px-3">
                                            <span className="text-white/40 text-xs">edusense.ai / dashboard</span>
                                        </div>
                                    </div>

                                    {/* Mini stat cards */}
                                    <div className="grid grid-cols-2 gap-3 mb-4">
                                        {[
                                            { label: 'Total Students', value: '28', icon: 'fa-users', bg: 'bg-blue-500' },
                                            { label: 'Focused', value: '21', icon: 'fa-check-circle', bg: 'bg-green-500' },
                                            { label: 'Unfocused', value: '4', icon: 'fa-exclamation-circle', bg: 'bg-red-500' },
                                            { label: 'Avg. Engagement', value: '78%', icon: 'fa-percentage', bg: 'bg-purple-500' },
                                        ].map(c => (
                                            <div key={c.label} className="bg-white/10 rounded-xl p-3">
                                                <div className={`w-8 h-8 ${c.bg} rounded-lg flex items-center justify-center mb-2`}>
                                                    <i className={`fas ${c.icon} text-white text-xs`}></i>
                                                </div>
                                                <div className="text-white font-bold text-lg leading-none">{c.value}</div>
                                                <div className="text-white/50 text-xs mt-1">{c.label}</div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Mini bar chart */}
                                    <div className="bg-white/10 rounded-xl p-4 mb-4">
                                        <div className="text-white/60 text-xs font-semibold mb-3">Engagement Distribution</div>
                                        {[
                                            { label: 'Focused', pct: '75%', color: 'bg-green-500' },
                                            { label: 'Moderate', pct: '15%', color: 'bg-yellow-500' },
                                            { label: 'Unfocused', pct: '10%', color: 'bg-red-500' },
                                        ].map(b => (
                                            <div key={b.label} className="mb-2 last:mb-0">
                                                <div className="flex justify-between text-white/50 text-xs mb-1">
                                                    <span>{b.label}</span><span>{b.pct}</span>
                                                </div>
                                                <div className="h-2 bg-white/10 rounded-full overflow-hidden">
                                                    <div className={`h-full ${b.color} rounded-full`} style={{ width: b.pct }}></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="flex items-center gap-2">
                                        <div className="w-2 h-2 bg-green-400 rounded-full pulse-slow"></div>
                                        <span className="text-white/50 text-xs">Live monitoring active — 28 students detected</span>
                                    </div>
                                </div>

                                {/* Floating student badge */}
                                <div className="absolute -bottom-4 -left-6 bg-white rounded-xl shadow-2xl p-3 border border-gray-100">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-indigo-100 rounded-lg flex items-center justify-center">
                                            <i className="fas fa-user-graduate text-indigo-600 text-sm"></i>
                                        </div>
                                        <div>
                                            <div className="text-gray-900 font-semibold text-sm">Student S012</div>
                                            <div className="text-green-600 text-xs flex items-center gap-1">
                                                <i className="fas fa-check-circle text-xs"></i> Focused · 91%
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        }

        /* ─── Features ─── */
        const FEATURES = [
            { icon: 'fa-face-smile', title: 'Face Recognition', desc: 'Automatically identify each registered student using advanced deep learning embeddings with 95%+ accuracy.', color: 'text-indigo-600', bg: 'bg-indigo-50' },
            { icon: 'fa-chart-line', title: 'Engagement Analytics', desc: 'Measure student attention in real-time using head pose estimation and behavioral pattern analysis.', color: 'text-emerald-600', bg: 'bg-emerald-50' },
            { icon: 'fa-video', title: 'Live Camera Feed', desc: 'Monitor your classroom live with an intelligent overlay showing student status and engagement scores.', color: 'text-blue-600', bg: 'bg-blue-50' },
            { icon: 'fa-upload', title: 'Video Upload', desc: 'Upload recorded classroom sessions for offline analysis. Get deep insights without real-time monitoring.', color: 'text-purple-600', bg: 'bg-purple-50' },
            { icon: 'fa-user-plus', title: 'Easy Registration', desc: 'Register students by capturing face images from camera or uploading existing photos — no special hardware needed.', color: 'text-rose-600', bg: 'bg-rose-50' },
            { icon: 'fa-chart-bar', title: 'Detailed Reports', desc: 'Per-student analytics: focus scores, head pose data, attention breakdowns, and session-wide summaries.', color: 'text-amber-600', bg: 'bg-amber-50' },
        ];

        function Features() {
            return (
                <section id="features" className="py-24 bg-gray-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <div className="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 rounded-full px-4 py-1.5 text-sm font-semibold mb-4">
                                <i className="fas fa-bolt text-xs"></i> Powerful Features
                            </div>
                            <h2 className="text-4xl font-bold text-gray-900 mb-4">Everything You Need to Monitor Engagement</h2>
                            <p className="text-lg text-gray-500 max-w-2xl mx-auto">
                                A complete AI toolkit for understanding and improving student attention and participation.
                            </p>
                        </div>

                        <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {FEATURES.map(f => (
                                <div key={f.title} className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 card-hover group">
                                    <div className={`w-12 h-12 ${f.bg} rounded-xl flex items-center justify-center mb-5 group-hover:scale-110 transition-transform duration-200`}>
                                        <i className={`fas ${f.icon} ${f.color} text-xl`}></i>
                                    </div>
                                    <h3 className="text-lg font-semibold text-gray-900 mb-2">{f.title}</h3>
                                    <p className="text-gray-500 text-sm leading-relaxed">{f.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        /* ─── How It Works ─── */
        const STEPS = [
            {
                step: '01', icon: 'fa-user-plus', title: 'Register Your Students',
                desc: 'Add students by capturing their face from a live camera or uploading existing photos. Takes under a minute per student.',
                cta: { label: 'Register Students', href: 'register.html' },
                gradient: 'from-indigo-500 to-purple-600',
            },
            {
                step: '02', icon: 'fa-video', title: 'Start Classroom Monitoring',
                desc: 'Open the dashboard, start your camera or upload a recording. The AI instantly recognises and tracks every registered student.',
                cta: { label: 'Open Dashboard', href: 'index_integrated.html' },
                gradient: 'from-emerald-500 to-teal-600',
            },
            {
                step: '03', icon: 'fa-chart-bar', title: 'Analyze & Get Insights',
                desc: 'Click "Analyze Classroom" for comprehensive per-student scores, attention heat maps, and classroom-wide engagement reports.',
                cta: { label: 'View Analytics', href: 'index_integrated.html' },
                gradient: 'from-rose-500 to-pink-600',
            },
        ];

        function HowItWorks() {
            return (
                <section id="how-it-works" className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="text-center mb-16">
                            <div className="inline-flex items-center gap-2 bg-purple-50 text-purple-700 rounded-full px-4 py-1.5 text-sm font-semibold mb-4">
                                <i className="fas fa-route text-xs"></i> Simple Process
                            </div>
                            <h2 className="text-4xl font-bold text-gray-900 mb-4">Up and Running in 3 Simple Steps</h2>
                            <p className="text-lg text-gray-500 max-w-2xl mx-auto">
                                No complex configuration — from setup to insights in minutes.
                            </p>
                        </div>

                        <div className="grid md:grid-cols-3 gap-10">
                            {STEPS.map((s, i) => (
                                <div key={s.step} className="relative text-center">
                                    {i < STEPS.length - 1 && (
                                        <div className="hidden md:block absolute top-10 left-[calc(50%+2.5rem)] right-0 h-px bg-gradient-to-r from-gray-200 to-transparent -z-10"></div>
                                    )}
                                    <div className={`w-20 h-20 bg-gradient-to-br ${s.gradient} rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-black/10`}>
                                        <i className={`fas ${s.icon} text-white text-2xl`}></i>
                                    </div>
                                    <div className="text-xs font-bold text-gray-400 tracking-widest uppercase mb-2">Step {s.step}</div>
                                    <h3 className="text-xl font-bold text-gray-900 mb-3">{s.title}</h3>
                                    <p className="text-gray-500 text-sm leading-relaxed mb-6">{s.desc}</p>
                                    <a href={s.cta.href} className="inline-flex items-center gap-2 text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-colors group">
                                        {s.cta.label}
                                        <i className="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                                    </a>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        }

        /* ─── CTA Banner ─── */
        function CTA() {
            return (
                <section className="hero-gradient py-24 relative overflow-hidden">
                    <div className="absolute inset-0 dot-grid opacity-50"></div>
                    <div className="absolute -top-32 -right-32 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
                    <div className="absolute -bottom-32 -left-32 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>

                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
                        <h2 className="text-4xl sm:text-5xl font-bold text-white mb-4">Ready to Transform Your Classroom?</h2>
                        <p className="text-xl text-white/70 mb-10 max-w-2xl mx-auto">
                            Start tracking engagement, recognise students automatically, and unlock deep learning insights today.
                        </p>
                        <div className="flex flex-col sm:flex-row gap-4 justify-center">
                            <a
                                href="index_integrated.html"
                                className="inline-flex items-center justify-center gap-2 bg-white text-indigo-700 font-semibold px-8 py-4 rounded-xl hover:bg-indigo-50 transition-all shadow-2xl shadow-black/20 text-base"
                            >
                                <i className="fas fa-chart-line"></i> Open Dashboard
                            </a>
                            <a
                                href="register.html"
                                className="inline-flex items-center justify-center gap-2 bg-white/10 backdrop-blur text-white font-semibold px-8 py-4 rounded-xl hover:bg-white/20 transition-all border border-white/30 text-base"
                            >
                                <i className="fas fa-user-plus"></i> Register Students
                            </a>
                        </div>
                    </div>
                </section>
            );
        }

        /* ─── Footer ─── */
        function Footer() {
            return (
                <footer className="bg-gray-950 py-12">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center">
                                    <i className="fas fa-graduation-cap text-white text-sm"></i>
                                </div>
                                <span className="text-white font-bold text-lg">EduSense AI</span>
                            </div>
                            <div className="flex items-center gap-6">
                                <a href="index_integrated.html" className="text-gray-500 hover:text-white text-sm transition-colors">Dashboard</a>
                                <a href="register.html" className="text-gray-500 hover:text-white text-sm transition-colors">Register Students</a>
                                <a href="#features" className="text-gray-500 hover:text-white text-sm transition-colors">Features</a>
                            </div>
                            <p className="text-gray-600 text-sm">© 2024 EduSense AI — Classroom Engagement Analytics</p>
                        </div>
                    </div>
                </footer>
            );
        }

        /* ─── App ─── */
        function App() {
            return (
                <div>
                    <Navbar />
                    <Hero />
                    <Features />
                    <HowItWorks />
                    <CTA />
                    <Footer />
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
